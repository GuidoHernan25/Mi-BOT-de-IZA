services:
  evolution-api:
    container_name: stockbot-evolution-api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      - evolution-postgres
      - evolution-redis
    ports:
      - "8080:8080"
    env_file:
      - evolution.env
    volumes:
      - evolution-instances:/evolution/instances

  evolution-postgres:
    container_name: stockbot-evolution-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_dev
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data

  evolution-redis:
    container_name: stockbot-evolution-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution-redis-data:/data

volumes:
  evolution-instances:
  evolution-postgres-data:
  evolution-redis-data:
